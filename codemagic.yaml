workflows:
  android-workflow:
    name: Android Build
    instance_type: mac_mini
    environment:
      groups:
        - keystore_credentials
      java: 17
      sdk: 34
    scripts:
      - name: Build Android APK
        script: |
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/debug/**/*.apk
    publishing:
      email:
        recipients:
          - irttaw@gmail.com  #
